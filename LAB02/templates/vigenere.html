<!DOCTYPE html>
<html lang="en">
<head>
    <title>Vigenere Cipher</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>

<body>

<div class="container">

<table class="table">

<tr>
<td style="text-align:center;font-weight:bold;font-size:25px;">
VIGENERE CIPHER
</td>
</tr>

<tr>
<td style="font-weight:bold;color:blue">
ENCRYPTION
</td>
</tr>

<tr>
<td>

<form method="POST" action="/vigenere_encrypt">

<label>Plain text</label>
<input type="text" class="form-control" name="inputPlainText" required>

<label>Key</label>
<input type="text" class="form-control" name="inputKeyPlain" required>

<br>

<button class="btn btn-primary">
Encrypt
</button>

</form>

</td>
</tr>

<tr>
<td style="font-weight:bold;color:blue">
DECRYPTION
</td>
</tr>

<tr>
<td>

<form method="POST" action="/vigenere_decrypt">

<label>Cipher text</label>
<input type="text" class="form-control" name="inputCipherText" required>

<label>Key</label>
<input type="text" class="form-control" name="inputKeyCipher" required>

<br>

<button class="btn btn-success">
Decrypt
</button>

</form>

</td>
</tr>

</table>

</div>

</body>
</html>
