<!DOCTYPE html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Rail Fence Cipher</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="container mt-5">
      <!-- Title -->
      <h2 class="text-center font-weight-bold mb-4">Rail Fence Cipher</h2>

      <div class="row">
        <!-- Encrypt Section -->
        <div class="col-md-6">
          <div class="card">
            <div class="card-header bg-primary text-white">Encryption</div>

            <div class="card-body">
              <form action="/railfence_encrypt" method="POST">
                <!-- Plain Text -->
                <div class="form-group">
                  <label>Plain Text</label>
                  <input
                    type="text"
                    class="form-control"
                    name="inputPlainText"
                    placeholder="Enter message"
                    required
                  />
                </div>

                <!-- Key -->
                <div class="form-group">
                  <label>Key (Number of Rails)</label>
                  <input
                    type="number"
                    class="form-control"
                    name="inputKeyPlain"
                    min="2"
                    required
                  />
                </div>

                <button type="submit" class="btn btn-primary btn-block">
                  Encrypt
                </button>
              </form>
            </div>
          </div>
        </div>

        <!-- Decrypt Section -->
        <div class="col-md-6">
          <div class="card">
            <div class="card-header bg-success text-white">Decryption</div>

            <div class="card-body">
              <form action="/railfence_decrypt" method="POST">
                <!-- Cipher Text -->
                <div class="form-group">
                  <label>Cipher Text</label>
                  <input
                    type="text"
                    class="form-control"
                    name="inputCipherText"
                    placeholder="Enter cipher text"
                    required
                  />
                </div>

                <!-- Key -->
                <div class="form-group">
                  <label>Key</label>
                  <input
                    type="number"
                    class="form-control"
                    name="inputKeyCipher"
                    min="2"
                    required
                  />
                </div>

                <button type="submit" class="btn btn-success btn-block">
                  Decrypt
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
